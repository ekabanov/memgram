name: Memgram
options:
  bundleIdPrefix: com.memgram
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
    watchOS: "10.0"
  defaultConfig: Debug
  xcodeVersion: "15"
  groupSortPosition: top
  generateEmptyDirectories: true

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "6.0.0"
  WhisperKit:
    url: https://github.com/ekabanov/WhisperKit
    revision: "69c0a9d60199725ac216e80797a732836c473c1f"
  MLXSwiftLM:
    url: https://github.com/ml-explore/mlx-swift-lm
    branch: main
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: "2.0.0"

targets:
  Memgram:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Memgram
        excludes:
          - Resources/Info.plist
          - Resources/Memgram.entitlements
          - BugReport/BugReportConfig.swift.example
    resources:
      - path: Memgram/Resources
        excludes:
          - Memgram.entitlements
    info:
      path: Memgram/Resources/Info.plist
      properties:
        NSMicrophoneUsageDescription: "Memgram uses your microphone to capture your voice in meetings."
        NSAudioCaptureUsageDescription: "Memgram captures system audio to transcribe meeting calls."
        NSScreenCaptureUsageDescription: "Memgram captures system audio from your screen to transcribe calls. (Used on older macOS only. No video is ever recorded or stored.)"
        NSCalendarsFullAccessUsageDescription: "Memgram reads your calendar to suggest recording scheduled meetings and to use event details for more accurate summaries."
        CFBundleIdentifier: com.memgram.app
        CFBundleName: Memgram
        CFBundleDisplayName: Memgram
        LSUIElement: true
        NSPrincipalClass: NSApplication
        CFBundleIconFile: AppIcon
        LSMinimumSystemVersion: "14.0"
    entitlements:
      path: Memgram/Resources/Memgram.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.device.audio-input: true
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.temporary-exception.audio-unit-host: true
        com.apple.security.personal-information.calendars: true
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.memgram.app
        com.apple.developer.icloud-services:
          - CloudKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.memgram.app
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "6N57Z7GY37"
        SWIFT_STRICT_CONCURRENCY: minimal
        MARKETING_VERSION: "0.4.0"
        CURRENT_PROJECT_VERSION: "4"
        ENABLE_HARDENED_RUNTIME: YES
    dependencies:
      - package: GRDB
        product: GRDB
      - package: WhisperKit
        product: WhisperKit
      - package: MLXSwiftLM
        product: MLXLLM
      - package: MarkdownUI
        product: MarkdownUI
    scheme:
      testTargets: []

  MemgramMobile:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Memgram/Database
      - path: Memgram/Sync
      - path: Memgram/Sync/AudioChunkService.swift
      - path: Memgram/Calendar/CalendarContext.swift
      - path: Memgram/Calendar/CalendarManager.swift
      - path: Memgram/Calendar/CalendarNotificationService.swift
      - path: Memgram/Utilities
      - path: Memgram/BugReport
        excludes:
          - BugReportConfig.swift.example
      - path: MemgramMobile
        excludes:
          - Resources/Info.plist
          - Resources/MemgramMobile.entitlements
      - path: MemgramMobile/WatchConnectivity
    resources:
      - path: MemgramMobile/Resources/Assets.xcassets
    info:
      path: MemgramMobile/Resources/Info.plist
      properties:
        CFBundleIdentifier: com.memgram.mobile
        CFBundleName: Memgram
        CFBundleDisplayName: Memgram
        CFBundleIconName: AppIcon
        NSCalendarsFullAccessUsageDescription: "Memgram reads your calendar to match recordings with scheduled meetings."
        NSMicrophoneUsageDescription: "Memgram records meeting audio for transcription."
        UIBackgroundModes:
          - remote-notification
        UILaunchScreen: {}
    entitlements:
      path: MemgramMobile/Resources/MemgramMobile.entitlements
      properties:
        com.apple.security.personal-information.calendars: true
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.memgram.app
        com.apple.developer.icloud-services:
          - CloudKit
        aps-environment: $(APS_ENVIRONMENT)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.memgram.mobile
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "6N57Z7GY37"
        SWIFT_STRICT_CONCURRENCY: minimal
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
      configs:
        Debug:
          APS_ENVIRONMENT: development
        Release:
          APS_ENVIRONMENT: production
    dependencies:
      - package: GRDB
        product: GRDB
      - package: MarkdownUI
        product: MarkdownUI
      - target: MemgramWatch
    scheme:
      testTargets: []

  MemgramWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: MemgramWatch
    resources:
      - path: MemgramWatch/Assets.xcassets
    info:
      path: MemgramWatch/Info.plist
      properties:
        CFBundleIdentifier: com.memgram.mobile.watchkitapp
        CFBundleName: Memgram
        CFBundleDisplayName: Memgram
        CFBundleIconName: AppIcon
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.memgram.mobile
        NSMicrophoneUsageDescription: "Memgram records meeting audio on your Apple Watch."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.memgram.mobile.watchkitapp
        SWIFT_VERSION: "5.9"
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "6N57Z7GY37"
        SWIFT_STRICT_CONCURRENCY: minimal
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
    scheme:
      testTargets: []
