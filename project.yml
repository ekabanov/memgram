name: Memgram
options:
  bundleIdPrefix: com.memgram
  deploymentTarget:
    macOS: "14.0"
  defaultConfig: Debug
  xcodeVersion: "15"
  groupSortPosition: top
  generateEmptyDirectories: true

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "6.0.0"
  WhisperKit:
    url: https://github.com/ekabanov/WhisperKit
    revision: "69c0a9d60199725ac216e80797a732836c473c1f"
  MLXSwiftLM:
    url: https://github.com/ml-explore/mlx-swift-lm
    branch: main
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: "2.0.0"

targets:
  Memgram:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Memgram
        excludes:
          - Resources/Info.plist
          - Resources/Memgram.entitlements
    resources:
      - path: Memgram/Resources
        excludes:
          - Memgram.entitlements
    info:
      path: Memgram/Resources/Info.plist
      properties:
        NSMicrophoneUsageDescription: "Memgram uses your microphone to capture your voice in meetings."
        NSAudioCaptureUsageDescription: "Memgram captures system audio to transcribe meeting calls."
        NSScreenCaptureUsageDescription: "Memgram captures system audio from your screen to transcribe calls. (Used on older macOS only. No video is ever recorded or stored.)"
        NSCalendarsFullAccessUsageDescription: "Memgram reads your calendar to suggest recording scheduled meetings and to use event details for more accurate summaries."
        CFBundleIdentifier: com.memgram.app
        CFBundleName: Memgram
        CFBundleDisplayName: Memgram
        LSUIElement: true
        NSPrincipalClass: NSApplication
        CFBundleIconFile: AppIcon
        LSMinimumSystemVersion: "14.0"
    entitlements:
      path: Memgram/Resources/Memgram.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.device.audio-input: true
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.temporary-exception.audio-unit-host: true
        com.apple.security.personal-information.calendars: true
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.memgram.app
        com.apple.developer.icloud-services:
          - CloudKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.memgram.app
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "6N57Z7GY37"
        SWIFT_STRICT_CONCURRENCY: minimal
        MARKETING_VERSION: "0.2.0"
        CURRENT_PROJECT_VERSION: "2"
        ENABLE_HARDENED_RUNTIME: YES
    dependencies:
      - package: GRDB
        product: GRDB
      - package: WhisperKit
        product: WhisperKit
      - package: MLXSwiftLM
        product: MLXLLM
      - package: MarkdownUI
        product: MarkdownUI
    scheme:
      testTargets: []
